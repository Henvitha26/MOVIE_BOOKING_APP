<div class="auth-wrapper">
  <div class="auth-card shadow">
    <h3 class="title text-center">
      Welcome Back <span class="icon">🎬</span>
    </h3>

    <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success mt-3">{{ success }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="mt-3">

      <input
        class="form-control mb-3"
        placeholder="Username"
        formControlName="username"
      />
      <small class="text-danger"
        *ngIf="f['username'].touched && f['username'].invalid">
        Username is required
      </small>

      <div class="password-wrap mt-3">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control"
          placeholder="Password"
          formControlName="password"
        />
        <button type="button" class="eye-btn" (click)="togglePassword()">
          {{ showPassword ? '🙈' : '👁️' }}
        </button>
      </div>

      <small class="text-danger"
        *ngIf="f['password'].touched && f['password'].invalid">
        Password is required
      </small>

      <button class="btn btn-info w-100 text-white mt-4" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="text-center mt-3">
        <small>
          Don’t have an account?
          <a routerLink="/register" class="link ms-1">Register here</a>
        </small>
      </div>

      <div class="text-center mt-2">
        <a routerLink="/forgot-password" class="link">Forgot Password?</a>
      </div>
    </form>
  </div>
</div>
