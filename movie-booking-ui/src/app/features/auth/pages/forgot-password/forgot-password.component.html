<div class="auth-wrapper">
  <div class="auth-card shadow">
    <h3 class="title text-center">Reset Password</h3>

    <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success mt-3">{{ success }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-3">

      <input class="form-control mb-3" placeholder="Username" formControlName="username" />
      <small class="text-danger" *ngIf="f['username'].touched && f['username'].invalid">
        Username is required
      </small>

      <input class="form-control mt-3" type="password" placeholder="New Password" formControlName="newPassword" />
      <small class="text-danger" *ngIf="f['newPassword'].touched && f['newPassword'].invalid">
        Minimum 6 characters
      </small>

      <input class="form-control mt-3" type="password" placeholder="Confirm Password" formControlName="confirmPassword" />
      <small class="text-danger" *ngIf="form.errors?.['mismatch']">
        Passwords do not match
      </small>

      <button class="btn btn-info w-100 text-white mt-4" type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Reset Password' }}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="link">Back to Login</a>
      </div>

    </form>
  </div>
</div>
