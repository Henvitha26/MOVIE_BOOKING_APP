<div class="container mt-4">
  <h3 class="text-center fw-bold mb-4">✏️ My Tickets</h3>

  <div *ngIf="loading" class="text-center">Loading...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="row justify-content-center g-4">
    <div class="col-md-4" *ngFor="let t of tickets">
      <div class="card shadow p-4 text-center">

        <h5 class="fw-bold">{{ t.movieName }}</h5>
        <p class="text-muted mb-1">{{ t.theatreName }}</p>

        <!-- ✅ SEAT NUMBERS -->
        <p class="mb-1">
          <b>Seats:</b>
          <span class="fw-semibold">{{ t.seats }}</span>
        </p>

        <p class="mb-1">
          <b>Quantity:</b> {{ t.quantity }}
        </p>

        <p class="text-success fw-semibold mt-2">
          {{ t.status }}
        </p>

      </div>
    </div>
  </div>
</div>
