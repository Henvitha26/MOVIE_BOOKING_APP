<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
  <a class="navbar-brand fw-bold" routerLink="/">🎬 MovieBookingApp</a>

  <div class="ms-auto d-flex align-items-center gap-3">

    <a routerLink="/" class="nav-link text-white">Home</a>

    <!-- BEFORE LOGIN -->
    <ng-container *ngIf="!isLoggedIn">
      <a routerLink="/register" class="nav-link text-white">Register</a>
      <a routerLink="/login" class="nav-link text-white">Login</a>
    </ng-container>

    <!-- AFTER LOGIN -->
    <ng-container *ngIf="isLoggedIn">

      <a routerLink="/my-tickets" class="nav-link text-white">
        My Tickets
      </a>

      <!-- 🛠 ADMIN ONLY -->
      <a *ngIf="username === 'admin'"
         routerLink="/admin"
         class="nav-link text-white">
        Admin
      </a>

      <a routerLink="/forgot-password" class="nav-link text-white">
        Change Password
      </a>

      <span class="text-warning fw-semibold">
        Hi, {{ username }}
      </span>

      <button class="btn btn-danger btn-sm" (click)="logout()">
        Logout
      </button>

    </ng-container>

  </div>
</nav>
